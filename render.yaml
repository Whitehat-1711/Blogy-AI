services:
  - type: web
    name: blogy-api
    runtime: python
    plan: free
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn core.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: MONGODB_DB_NAME
        value: blogy
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_ENABLED
        value: "false"
      - key: MONGODB_URL
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: HASHNODE_API_TOKEN
        sync: false
      - key: HASHNODE_PUBLICATION_ID
        sync: false
      - key: HASHNODE_AUTO_PUBLISH
        value: "false"
      - key: GROQ_MAX_RETRIES
        value: "1"
      - key: GROQ_MAX_CONCURRENCY
        value: "2"
      - key: LLM_PRIMARY_PROVIDER
        value: groq
      - key: LLM_FALLBACK_PROVIDER
        value: gemini
      - key: CORS_ORIGINS
        sync: false
